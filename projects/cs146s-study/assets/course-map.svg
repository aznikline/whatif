  <circle cx="825" cy="518" r="7" fill="#1d2a36"/>
  <text x="855" y="525" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Deploy</text>
  <circle cx="980" cy="518" r="7" fill="#1d2a36"/>
  <text x="1010" y="525" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Observe</text>
  <circle cx="1135" cy="518" r="7" fill="#1d2a36"/>
  <text x="1165" y="525" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Adapt</text>

  <text x="155" y="590" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58636d">The course treats AI-native development as a full lifecycle, not a prompt-only skill.</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#1d2a36"/>
    </marker>
