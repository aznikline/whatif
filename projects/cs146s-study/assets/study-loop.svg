  <text x="885" y="553" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Verify</text>

  <rect x="160" y="510" width="230" height="72" rx="16" fill="#efe3f7" stroke="#6e4e8e" stroke-width="2"/>
  <text x="222" y="553" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Reflect</text>

  <rect x="155" y="255" width="230" height="72" rx="16" fill="#f5ebcf" stroke="#9e7a24" stroke-width="2"/>
  <text x="203" y="298" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Operationalize</text>

  <path d="M600 187 C745 210 848 230 940 255" stroke="#1d2a36" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M1035 327 C1045 410 1020 475 935 510" stroke="#1d2a36" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M825 546 C690 620 480 622 390 546" stroke="#1d2a36" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M275 510 C182 470 150 385 190 327" stroke="#1d2a36" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>
  <path d="M270 255 C352 190 460 170 515 152" stroke="#1d2a36" stroke-width="4" fill="none" marker-end="url(#arrow2)"/>

  <text x="70" y="655" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58636d">Recommended rhythm: read the official material, reproduce a workflow, verify it with tests or review, then fold the lesson back into your own engineering environment.</text>

  <defs>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
