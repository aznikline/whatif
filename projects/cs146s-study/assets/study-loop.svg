  <text x="60" y="108" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#58636d">Convert each week into a reusable engineering habit</text>

  <circle cx="600" cy="380" r="210" fill="#ffffff" stroke="#c4c8cc" stroke-width="2"/>
