  <text x="534" y="404" font-family="Helvetica, Arial, sans-serif" font-size="18" fill="#d9e0e6">Study loop</text>

  <rect x="515" y="115" width="170" height="72" rx="16" fill="#dde8d5" stroke="#4a6b50" stroke-width="2"/>
  <text x="560" y="158" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Read</text>

  <rect x="845" y="255" width="190" height="72" rx="16" fill="#d8e7f5" stroke="#3a5f87" stroke-width="2"/>
  <text x="886" y="298" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#1d2a36">Build</text>

